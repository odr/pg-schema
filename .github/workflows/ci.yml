name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 1,7,13,19,25 * *'

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: build (${{ matrix.profile }}, GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.10.3', '9.12.4', '9.14.1']
        profile: [full, minimal]

    env:
      PROJECT_FILE: cabal.project.hackage
      PROJECT_LOCAL: cabal.project.hackage.local
      FREEZE_FILE: cabal.project.hackage.freeze

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: haskell
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: '3.16'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libgmp-dev

      - name: Configure project for CI
        shell: bash
        run: |
          {
            printf '%s\n' "with-compiler: ghc-${{ matrix.ghc }}"
            # postgresql-simple 0.7.x: base <4.22, template-haskell <2.24 (GHC 9.14)
            if [ "${{ matrix.ghc }}" = "9.14.1" ]; then
              printf '%s\n' 'allow-newer: all'
            fi
          } > "$PROJECT_LOCAL"

      - name: Set package flag constraints
        id: flags
        shell: bash
        run: |
          case "${{ matrix.profile }}" in
            full)
              echo 'constraint=pg-schema +time +uuid +case-insensitive +arbitrary +flat +hashable' \
                >> "$GITHUB_OUTPUT"
              ;;
            minimal)
              echo 'constraint=pg-schema -time -uuid -case-insensitive -arbitrary -flat -hashable' \
                >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unknown profile: ${{ matrix.profile }}" >&2
              exit 1
              ;;
          esac

      - name: Freeze dependencies fingerprint
        id: plan
        shell: bash
        run: |
          cabal \
            --project-file="$PROJECT_FILE" \
            --with-compiler="ghc-${{ matrix.ghc }}" \
            --constraint="${{ steps.flags.outputs.constraint }}" \
            freeze
          echo "hash=$(sha256sum "$FREEZE_FILE" | cut -c1-16)" \
            >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: ${{ steps.haskell.outputs.cabal-store }}
          key: >-
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ matrix.profile }}-plan-${{
            steps.plan.outputs.hash }}
          restore-keys: |
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ matrix.profile }}-plan-
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: Build pg-schema
        shell: bash
        run: |
          cabal \
            --project-file="$PROJECT_FILE" \
            --with-compiler="ghc-${{ matrix.ghc }}" \
            --constraint="${{ steps.flags.outputs.constraint }}" \
            build --only-dependencies pg-schema
          cabal \
            --project-file="$PROJECT_FILE" \
            --with-compiler="ghc-${{ matrix.ghc }}" \
            --constraint="${{ steps.flags.outputs.constraint }}" \
            build pg-schema

      - uses: actions/cache/save@v5
        if: success()
        with:
          path: ${{ steps.haskell.outputs.cabal-store }}
          key: >-
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ matrix.profile }}-plan-${{
            steps.plan.outputs.hash }}

  test:
    name: test (hackage, GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 9.10.3: test-gen uses MultilineStrings (GHC 9.12+); build-only on 9.10.3
        ghc: ['9.12.4', '9.14.1']

    env:
      PG_CONN: >-
        dbname=schema_test host=localhost user=postgres password=postgres
      PROJECT_FILE: cabal.project.hackage
      PROJECT_LOCAL: cabal.project.hackage.local
      FREEZE_FILE: cabal.project.hackage.freeze

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: haskell
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: '3.16'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libgmp-dev

      - name: Configure project for CI
        shell: bash
        run: |
          {
            printf '%s\n' "with-compiler: ghc-${{ matrix.ghc }}"
            if [ "${{ matrix.ghc }}" = "9.14.1" ]; then
              printf '%s\n' 'allow-newer: all'
            fi
          } > "$PROJECT_LOCAL"

      - name: Freeze dependencies fingerprint
        id: plan
        shell: bash
        run: |
          cabal \
            --project-file="$PROJECT_FILE" \
            --with-compiler="ghc-${{ matrix.ghc }}" \
            --enable-tests \
            freeze
          echo "hash=$(sha256sum "$FREEZE_FILE" | cut -c1-16)" \
            >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: ${{ steps.haskell.outputs.cabal-store }}
          key: >-
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-hackage-plan-${{
            steps.plan.outputs.hash }}
          restore-keys: |
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-hackage-plan-
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: Build dependencies only
        shell: bash
        run: |
          cabal \
            --project-file="$PROJECT_FILE" \
            --with-compiler="ghc-${{ matrix.ghc }}" \
            --enable-tests \
            build --only-dependencies all

      - name: Create test database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres schema_test \
            || true

      - name: Run tests
        shell: bash
        run: |
          make test-run \
            CABAL='cabal --project-file=cabal.project.hackage --with-compiler=ghc-${{ matrix.ghc }} --enable-tests'

      - uses: actions/cache/save@v5
        if: success()
        with:
          path: ${{ steps.haskell.outputs.cabal-store }}
          key: >-
            ci-${{ runner.os }}-ghc-${{ matrix.ghc }}-hackage-plan-${{
            steps.plan.outputs.hash }}
