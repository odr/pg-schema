name: Setup GHC with cache
description: >-
  Restore installed GHC from Actions cache when possible, then run
  haskell-actions/setup (cabal update on every job). GHC install is skipped
  when the restored tree is already present.
inputs:
  ghc-version:
    description: GHC version (e.g. 9.12.4)
    required: true
  cabal-version:
    description: Cabal version for ghcup
    required: false
    default: '3.16'

runs:
  using: composite
  steps:
    - name: Restore GHC cache
      uses: actions/cache/restore@v5
      id: ghc-cache
      with:
        # Absolute paths: ~/.ghcup archives as ../../../.ghcup and restore fails.
        path: /home/runner/.ghcup/ghc/${{ inputs.ghc-version }}
        key: ghcup-v2-${{ runner.os }}-ghc-${{ inputs.ghc-version }}
        restore-keys: |
          ghcup-v2-${{ runner.os }}-ghc-

    - name: Remove partial GHC tree after cache miss
      if: steps.ghc-cache.outputs.cache-hit != 'true'
      shell: bash
      run: rm -rf "/home/runner/.ghcup/ghc/${{ inputs.ghc-version }}"

    - uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ inputs.ghc-version }}
        cabal-version: ${{ inputs.cabal-version }}
        cabal-update: true

    - name: Save GHC cache
      if: success() && steps.ghc-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: /home/runner/.ghcup/ghc/${{ inputs.ghc-version }}
        key: ghcup-v2-${{ runner.os }}-ghc-${{ inputs.ghc-version }}
