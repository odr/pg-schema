name: Setup GHC with cache
description: >-
  Restore installed GHC from Actions cache when possible, then run
  haskell-actions/setup (cabal update on every job).
inputs:
  ghc-version:
    description: GHC version (e.g. 9.12.4)
    required: true
  cabal-version:
    description: Cabal version for ghcup
    required: false
    default: '3.16'

runs:
  using: composite
  steps:
    - name: Restore GHC cache
      uses: actions/cache/restore@v5
      id: ghc-cache
      with:
        path: /home/runner/.ghcup/ghc/${{ inputs.ghc-version }}
        key: ghcup-v3-${{ runner.os }}-ghc-${{ inputs.ghc-version }}

    - name: Validate GHC cache
      id: ghc-valid
      shell: bash
      run: |
        set -euo pipefail
        ver="${{ inputs.ghc-version }}"
        bindir="$HOME/.ghcup/ghc/$ver/bin"
        valid=true
        if [ "${{ steps.ghc-cache.outputs.cache-hit }}" = "true" ]; then
          if [ ! -x "$bindir/ghc" ]; then
            valid=false
          elif ! "$bindir/ghc" --numeric-version | grep -q "^${ver}"; then
            valid=false
          fi
          if [ "$valid" = "false" ]; then
            echo "Discarding invalid GHC cache for $ver"
            rm -rf "$HOME/.ghcup/ghc/$ver"
          fi
        fi
        echo "valid=$valid" >> "$GITHUB_OUTPUT"

    - name: Link runner GHC into ghcup home
      shell: bash
      run: |
        set -euo pipefail
        ver="${{ inputs.ghc-version }}"
        home_ghc="$HOME/.ghcup/ghc/$ver"
        image_ghc="/usr/local/.ghcup/ghc/$ver"
        if [ ! -e "$home_ghc" ] && [ -d "$image_ghc" ]; then
          mkdir -p "$(dirname "$home_ghc")"
          ln -sfn "$image_ghc" "$home_ghc"
        fi

    - uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ inputs.ghc-version }}
        cabal-version: ${{ inputs.cabal-version }}
        cabal-update: true

    - name: Expose GHC on PATH
      shell: bash
      run: |
        set -euo pipefail
        ver="${{ inputs.ghc-version }}"
        bindir="$HOME/.ghcup/ghc/$ver/bin"
        if [ ! -x "$bindir/ghc" ]; then
          echo "GHC $ver is not installed under $bindir" >&2
          exit 1
        fi
        echo "$bindir" >> "$GITHUB_PATH"
        ghc --version

    - name: Save GHC cache
      if: >-
        success() &&
        (steps.ghc-cache.outputs.cache-hit != 'true' ||
        steps.ghc-valid.outputs.valid != 'true')
      uses: actions/cache/save@v5
      with:
        path: /home/runner/.ghcup/ghc/${{ inputs.ghc-version }}
        key: ghcup-v3-${{ runner.os }}-ghc-${{ inputs.ghc-version }}
